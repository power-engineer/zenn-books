title: "150時間残業の泥沼から、主導権を奪還せよ：年収1200万を実現する希少人材の生存戦略"
summary: |
  月150時間を超える異常な残業。現場を知らない上層部の理不尽。かつて泥沼の底にいた私は、組織のルールに従うのをやめ「ルールを書き換える」側に回ることで主導権を奪還した。本書は重電業界で培った組織掌握の実戦記録。防弾資料術、資産型DX、信頼資本の蓄積。会社にとって「あなたを失うことが最大の経営リスク」という状態を作り上げ、年収1200万の価値を証明せよ。noteでも一部公開中：https://note.com/power_engineer
